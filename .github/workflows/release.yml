name: Release

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Upgrade npm for trusted publishing
              run: npm install -g npm@latest

            - name: Show Node and npm versions
              run: node -v && npm -v

            - name: Install dependencies
              run: npm ci

            - name: Version or publish via Changesets
              id: changesets
              uses: changesets/action@v1
              with:
                  version: npm run version-packages
                  publish: npm run release
                  createGithubReleases: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Read release tag version
              if: steps.changesets.outputs.published == 'true'
              id: release-version
              run: |
                  VERSION="$(node -p "require('./package.json').version")"
                  echo "value=v${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Create GitHub tag and release
              if: steps.changesets.outputs.published == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release-version.outputs.value }}
                  name: ${{ steps.release-version.outputs.value }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # TEMPORARY: SAFE TO DELETE AFTER 1.0.0 BACKFILL
            - name: TEMPORARY - Check if v1.0.0 backfill is needed
              id: backfill-v100-check
              run: |
                  set -euo pipefail

                  if git ls-remote --exit-code --tags origin "refs/tags/v1.0.0" >/dev/null 2>&1; then
                    echo "needs_tag=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "needs_tag=true" >> "$GITHUB_OUTPUT"
                  fi

                  if curl -sfL \
                    -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/releases/tags/v1.0.0" >/dev/null 2>&1; then
                    echo "needs_release=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "needs_release=true" >> "$GITHUB_OUTPUT"
                  fi

                  if [ -f "CHANGELOG.md" ]; then
                    echo "body_path=CHANGELOG.md" >> "$GITHUB_OUTPUT"
                  elif [ -f "changelog.md" ]; then
                    echo "body_path=changelog.md" >> "$GITHUB_OUTPUT"
                  else
                    echo "::error::Neither CHANGELOG.md nor changelog.md exists."
                    exit 1
                  fi

            # TEMPORARY: SAFE TO DELETE AFTER 1.0.0 BACKFILL
            - name: TEMPORARY - Create and push missing v1.0.0 tag
              if: steps.backfill-v100-check.outputs.needs_tag == 'true'
              run: |
                  set -euo pipefail

                  TARGET_COMMIT=""
                  while read -r commit; do
                    version="$(git show "${commit}:package.json" 2>/dev/null | node -e 'let d=\"\"; process.stdin.on(\"data\", c => d += c); process.stdin.on(\"end\", () => { try { process.stdout.write(JSON.parse(d).version || \"\"); } catch { process.stdout.write(\"\"); } });')"
                    if [ "$version" = "1.0.0" ]; then
                      TARGET_COMMIT="$commit"
                      break
                    fi
                  done < <(git rev-list --first-parent HEAD)

                  if [ -z "$TARGET_COMMIT" ]; then
                    echo "::error::Could not find commit where package.json version is 1.0.0."
                    exit 1
                  fi

                  git tag "v1.0.0" "$TARGET_COMMIT"
                  git push origin "refs/tags/v1.0.0"

            # TEMPORARY: SAFE TO DELETE AFTER 1.0.0 BACKFILL
            - name: TEMPORARY - Create missing GitHub release for v1.0.0
              if: steps.backfill-v100-check.outputs.needs_release == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v1.0.0
                  name: v1.0.0
                  body_path: ${{ steps.backfill-v100-check.outputs.body_path }}
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
