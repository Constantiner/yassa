name: Release

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Upgrade npm for trusted publishing
              run: npm install -g npm@^11.5.1

            - name: Remove deprecated npm always-auth config
              run: npm config delete always-auth || true

            - name: Show Node and npm versions
              run: node -v && npm -v

            - name: Install dependencies
              run: npm ci

            - name: Version or publish via Changesets
              id: changesets
              uses: changesets/action@v1
              with:
                  version: npm run version-packages
                  publish: npm run release:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Print Changesets outputs
              run: |
                  echo "hasChangesets=${{ steps.changesets.outputs.hasChangesets }}"
                  echo "published=${{ steps.changesets.outputs.published }}"
                  echo "publishedPackages=${{ steps.changesets.outputs.publishedPackages }}"
