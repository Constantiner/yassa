name: Release

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Upgrade npm for trusted publishing
              run: npm install -g npm@^11.5.1

            - name: Remove deprecated npm always-auth config
              run: npm config delete always-auth || true

            - name: Show Node and npm versions
              run: node -v && npm -v

            - name: Install dependencies
              run: npm ci

            # ===== BEGIN ONE-TIME BACKFILL FOR v1.0.1 (DELETE THIS BLOCK AFTER SUCCESS) =====
            - name: One-time backfill publish/tag/release for v1.0.1
              env:
                  BACKFILL_VERSION: 1.0.1
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail

                  PACKAGE_NAME="$(node -p "require('./package.json').name")"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"
                  TAG="v${BACKFILL_VERSION}"

                  if [ "${PACKAGE_VERSION}" != "${BACKFILL_VERSION}" ]; then
                    echo "Skip backfill: package.json version is ${PACKAGE_VERSION}, expected ${BACKFILL_VERSION}."
                    exit 0
                  fi

                  if npm view "${PACKAGE_NAME}@${BACKFILL_VERSION}" version >/dev/null 2>&1; then
                    echo "npm backfill not required: ${PACKAGE_NAME}@${BACKFILL_VERSION} already published."
                  else
                    echo "Publishing missing npm version ${PACKAGE_NAME}@${BACKFILL_VERSION}..."
                    npm run release:publish
                  fi

                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
                    echo "Git tag ${TAG} already exists on origin."
                  else
                    echo "Creating missing git tag ${TAG} at ${GITHUB_SHA}..."
                    git tag "${TAG}" "${GITHUB_SHA}"
                    git push origin "refs/tags/${TAG}"
                  fi

                  CHANGELOG_FILE=""
                  if [ -f "CHANGELOG.md" ]; then
                    CHANGELOG_FILE="CHANGELOG.md"
                  elif [ -f "changelog.md" ]; then
                    CHANGELOG_FILE="changelog.md"
                  else
                    echo "::error::Neither CHANGELOG.md nor changelog.md exists."
                    exit 1
                  fi

                  NOTES_FILE="/tmp/release-notes-${BACKFILL_VERSION}.md"
                  awk -v version="${BACKFILL_VERSION}" '
                    $0 == "## " version { in_version = 1; next }
                    $0 ~ /^## / && in_version { exit }
                    in_version { print }
                  ' "${CHANGELOG_FILE}" > "${NOTES_FILE}"

                  if [ ! -s "${NOTES_FILE}" ]; then
                    echo "::error::Could not extract release notes for ${BACKFILL_VERSION} from ${CHANGELOG_FILE}."
                    exit 1
                  fi

                  if gh release view "${TAG}" >/dev/null 2>&1; then
                    echo "GitHub release ${TAG} already exists."
                  else
                    echo "Creating missing GitHub release ${TAG} from ${CHANGELOG_FILE} section ${BACKFILL_VERSION}..."
                    gh release create "${TAG}" \
                      --title "${TAG}" \
                      --notes-file "${NOTES_FILE}" \
                      --target "${GITHUB_SHA}"
                  fi
            # ===== END ONE-TIME BACKFILL FOR v1.0.1 (DELETE THIS BLOCK AFTER SUCCESS) =====
            - name: Version or publish via Changesets
              id: changesets
              uses: changesets/action@v1
              with:
                  version: npm run version-packages
                  publish: npm run release:publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Print Changesets outputs
              run: |
                  echo "hasChangesets=${{ steps.changesets.outputs.hasChangesets }}"
                  echo "published=${{ steps.changesets.outputs.published }}"
                  echo "publishedPackages=${{ steps.changesets.outputs.publishedPackages }}"
