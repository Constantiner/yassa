name: Release

on:
    push:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            - name: Version or publish via Changesets
              id: changesets
              uses: changesets/action@v1
              with:
                  version: npm run version-packages
                  publish: npm run release
                  createGithubReleases: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Read release tag version
              if: steps.changesets.outputs.published == 'true'
              id: release-version
              run: echo "value=v$(node -p \"JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version\")" >> "$GITHUB_OUTPUT"

            - name: Create GitHub tag and release
              if: steps.changesets.outputs.published == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.release-version.outputs.value }}
                  name: ${{ steps.release-version.outputs.value }}
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
